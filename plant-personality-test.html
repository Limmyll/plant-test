<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>你的命中注定 · 植物性格测试</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg-page: #F9F6F1;
    --bg-card: #FFFEFA;
    --text-primary: #2B2523;
    --text-secondary: #5C5048;
    --text-muted: #948B82;
    /* 中式配色三原色 */
    --dai-blue: #3B5A6D;
    --shi-green: #5B8C6F;
    --rouge: #B5453A;
    --rouge-light: #D4847A;
    --rouge-ghost: rgba(181,69,58,0.05);
    --border: #E0D9CF;
    --border-light: #EDE7DD;
    /* 优化：阴影雾化为超浅色烟雾感 */
    --shadow-card: 0 2px 32px rgba(92,75,62,0.03);
    --shadow-card-hover: 0 4px 40px rgba(92,75,62,0.05);
    --radius-lg: 16px;
    --radius-md: 12px;
    --radius-sm: 8px;
    --transition-smooth: 0.65s cubic-bezier(0.22, 0.61, 0.36, 1);
    /* 优化：呼吸感排版 — line-height 1.9-2.2，letter-spacing +0.5px */
    --font-body: 15px;
    --line-height-body: 2.0;
    --card-width: 330px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Noto Serif SC', Georgia, serif;
    background: var(--bg-page);
    -webkit-tap-highlight-color: transparent;
    -webkit-font-smoothing: antialiased;
    user-select: none;
    -webkit-user-select: none;
    color: var(--text-primary);
    font-size: var(--font-body);
    line-height: var(--line-height-body);
    /* 优化：字间距拉开0.5px，呼吸缝隙 */
    letter-spacing: 0.9px;
  }

  /* ===== 主容器 ===== */
  .app-container {
    width: 100%;
    height: 100%;
    max-width: 430px;
    margin: 0 auto;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* ===== 页面容器 ===== */
  .page {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 36px 32px;
    opacity: 0;
    transform: translateY(20px);
    pointer-events: none;
    transition: opacity var(--transition-smooth), transform var(--transition-smooth);
  }
  .page.active {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  /* ===== 首页 - 封面 ===== */
  .home-page { text-align: center; gap: 28px; }
  .home-logo {
    width: 72px; height: 72px;
    opacity: 0.85;
    animation: float 3.2s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  .home-title {
    font-size: 26px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: 3px;
    line-height: 1.5;
  }
  .home-title .highlight {
    background: linear-gradient(135deg, var(--rouge), var(--rouge-light));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .home-subtitle {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 4px;
    font-weight: 400;
    text-transform: uppercase;
  }
  .home-divider {
    width: 40px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--rouge-light), transparent);
    border-radius: 1px;
  }
  .home-desc {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 2;
    max-width: 260px;
  }
  .btn-start {
    margin-top: 8px;
    padding: 16px 52px;
    background: var(--rouge);
    color: #fff;
    border: none;
    border-radius: 50px;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 3px;
    cursor: pointer;
    box-shadow: 0 8px 28px rgba(181,69,58,0.22);
    transition: all 0.3s ease;
  }
  .btn-start:active {
    transform: scale(0.96);
    box-shadow: 0 4px 14px rgba(181,69,58,0.14);
  }

  /* ===== 答题页 ===== */
  .quiz-page { justify-content: flex-start; padding-top: 52px; gap: 0; }
  .quiz-progress-wrap { width: 100%; margin-bottom: 36px; }
  .quiz-progress-bar {
    width: 100%; height: 3px;
    background: var(--border-light);
    border-radius: 2px; overflow: hidden;
  }
  .quiz-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--shi-green), var(--dai-blue));
    border-radius: 2px;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .quiz-progress-text {
    text-align: right; font-size: 11px;
    color: var(--text-muted); margin-top: 8px; letter-spacing: 2px;
  }
  .quiz-question-card {
    width: 100%;
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    padding: 32px 24px;
    box-shadow: var(--shadow-card);
    text-align: center;
    border: none;
    transition: opacity 0.35s ease, transform 0.35s ease;
  }
  .quiz-question-card.switching { opacity: 0; transform: translateY(-12px); }
  .quiz-question-number {
    font-size: 11px; color: var(--rouge);
    letter-spacing: 5px; margin-bottom: 18px; font-weight: 600;
  }
  .quiz-question-title {
    font-size: 17px; font-weight: 700;
    color: var(--text-primary); line-height: 1.8; margin-bottom: 28px;
  }
  .quiz-options { display: flex; flex-direction: column; gap: 10px; }
  .quiz-option {
    width: 100%; padding: 16px 18px;
    background: #F9F5F0;
    border: 1.5px solid transparent;
    border-radius: var(--radius-md);
    font-size: 14px; color: var(--text-primary);
    cursor: pointer; text-align: left;
    transition: all 0.3s ease;
    font-weight: 500; line-height: 1.7;
  }
  .quiz-option .option-label {
    display: inline-block; width: 26px; height: 26px;
    line-height: 26px; text-align: center;
    background: rgba(91,140,111,0.12);
    color: var(--shi-green); border-radius: 50%;
    font-size: 12px; font-weight: 700;
    margin-right: 10px; flex-shrink: 0; transition: all 0.3s ease;
  }
  .quiz-option.selected .option-label { background: var(--shi-green); color: #fff; }
  .quiz-option:active { background: #EFE8DF; border-color: var(--border); transform: scale(0.98); }
  .quiz-option.selected {
    background: rgba(91,140,111,0.08);
    border-color: var(--shi-green);
  }

  /* ==================== 结果页 - 极简新中式 ==================== */
  .result-page {
    justify-content: flex-start;
    padding: 0 0 40px 0;
    gap: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .result-page-inner {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    padding: 40px 24px 56px;
  }

  /* 结果头部 */
  .result-header { text-align: center; margin-bottom: 12px; }
  .result-plant-icon {
    width: 56px; height: 56px;
    margin: 0 auto 16px;
    opacity: 0.8;
    animation: float 2.8s ease-in-out infinite;
  }
  .result-plant-name {
    font-size: 28px; font-weight: 800;
    color: var(--text-primary);
    letter-spacing: 4px;
    line-height: 1.3;
  }
  .result-plant-subtitle {
    font-size: 13px; color: var(--text-muted);
    letter-spacing: 3px; margin-top: 8px;
    font-weight: 400; font-style: italic;
  }
  .result-phase-badge {
    display: inline-block;
    margin-top: 12px;
    padding: 6px 20px;
    border: none;
    border-radius: 20px;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--dai-blue);
    background: rgba(59,90,109,0.05);
    box-shadow: 0 1px 12px rgba(92,75,62,0.02);
  }

  /* ===== 核心金句 ===== */
  .result-quote-block {
    width: 100%;
    text-align: center;
    padding: 32px 24px;
    margin: 24px 0 12px;
    position: relative;
  }
  .result-quote-text {
    font-size: 19px; font-weight: 600;
    color: var(--text-primary);
    line-height: 2;
    letter-spacing: 2px;
    position: relative;
    display: inline-block;
    max-width: 300px;
  }
  .result-quote-text::before {
    content: '\201C';
    font-size: 44px; color: var(--rouge-light);
    position: absolute; left: -32px; top: -14px;
    font-family: Georgia, 'Noto Serif SC', serif;
    line-height: 1; font-weight: 400; opacity: 0.6;
  }
  .result-quote-text::after {
    content: '\201D';
    font-size: 44px; color: var(--rouge-light);
    position: absolute; right: -32px; bottom: -28px;
    font-family: Georgia, 'Noto Serif SC', serif;
    line-height: 1; font-weight: 400; opacity: 0.6;
  }
  .result-quote-divider {
    width: 36px; height: 1px;
    background: var(--border);
    margin: 24px auto 0;
    border-radius: 1px;
  }

  /* ===== 胶囊标签 ===== */
  .result-tags-row {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin: 20px 0 28px;
  }
  .result-tag-pill {
    display: inline-block;
    padding: 6px 16px;
    border: none;
    border-radius: 18px;
    font-size: 11px;
    color: var(--text-secondary);
    letter-spacing: 2.5px;
    font-weight: 500;
    background: rgba(247,244,239,0.7);
    box-shadow: 0 1px 8px rgba(92,75,62,0.02);
  }

  /* ===== 雷达图 ===== */
  .radar-container {
    width: 100%;
    max-width: 240px;
    margin: 8px auto 32px;
    position: relative;
  }
  .radar-container canvas { width: 100% !important; height: auto !important; }
  .radar-section-title {
    text-align: center;
    font-size: 11px; color: var(--text-muted);
    letter-spacing: 4px; margin-bottom: 4px;
    font-weight: 500;
  }

  /* ===== 生命切片卡片（极简 — 优化：去边框、烟雾阴影） ===== */
  .slice-card {
    width: 100%;
    max-width: var(--card-width);
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    padding: 30px 26px;
    margin-bottom: 14px;
    box-shadow: var(--shadow-card);
    position: relative;
    border: none;
    /* 生长动画初始状态 — 优化：更细腻的延迟 */
    opacity: 0;
    transform: translateY(28px);
    transition: opacity 0.75s cubic-bezier(0.22, 0.61, 0.36, 1),
                transform 0.75s cubic-bezier(0.22, 0.61, 0.36, 1);
  }
  .slice-card.grown {
    opacity: 1;
    transform: translateY(0);
  }
  .slice-card-icon {
    width: 28px; height: 28px;
    margin-bottom: 12px;
    opacity: 0.65;
  }
  .slice-card-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: 3.5px;
    margin-bottom: 18px;
    padding-bottom: 14px;
    border-bottom: 1px solid rgba(224,217,207,0.5);
  }
  .slice-card-body {
    font-size: var(--font-body);
    color: var(--text-secondary);
    line-height: var(--line-height-body);
    text-align: left;
    letter-spacing: 0.9px;
  }
  /* 素描卡片 */
  .slice-card.sketch-card .slice-card-title { color: var(--dai-blue); border-bottom-color: rgba(59,90,109,0.12); }
  .slice-card.sketch-card .slice-card-body { font-size: 16px; font-weight: 500; color: var(--text-primary); font-style: italic; }
  /* 归宿卡片 — 优化：去边框，温润渐变 */
  .slice-card.exit-card {
    background: linear-gradient(135deg, #FBF9F5, #FFFEFA);
    border: none;
    box-shadow: 0 2px 28px rgba(92,75,62,0.04);
  }
  .slice-card.exit-card .slice-card-title { color: var(--rouge); border-bottom-color: rgba(181,69,58,0.08); }
  .slice-card.exit-card .slice-card-body { color: #6B3A2E; font-weight: 500; }

  /* 灵魂契约植物 — 优化：去边框，烟雾阴影 */
  .contract-card {
    width: 100%;
    max-width: var(--card-width);
    background: rgba(255,254,250,0.9);
    border: none;
    border-radius: var(--radius-lg);
    padding: 30px 26px;
    margin-bottom: 14px;
    box-shadow: 0 4px 28px rgba(92,75,62,0.03);
    opacity: 0;
    transform: translateY(28px);
    transition: opacity 0.75s cubic-bezier(0.22, 0.61, 0.36, 1) 0.12s,
                transform 0.75s cubic-bezier(0.22, 0.61, 0.36, 1) 0.12s;
  }
  .contract-card.grown { opacity: 1; transform: translateY(0); }
  .contract-card-label {
    font-size: 11px; font-weight: 500; color: var(--text-muted);
    letter-spacing: 3.5px; margin-bottom: 14px; text-transform: uppercase;
  }
  .contract-card-name {
    font-size: 20px; font-weight: 700; color: var(--text-primary);
    margin-bottom: 16px; letter-spacing: 1.5px;
  }
  .contract-card-desc {
    font-size: var(--font-body); line-height: var(--line-height-body);
    color: var(--text-secondary); text-align: justify; letter-spacing: 0.9px;
  }

  /* 共振植物谱系卡片 — 新中式高级感 */
  .resonance-card {
    width: 100%;
    max-width: var(--card-width);
    background: linear-gradient(135deg, rgba(247,244,239,0.6), rgba(255,254,250,0.9));
    border: none;
    border-radius: var(--radius-lg);
    padding: 30px 26px;
    margin-bottom: 14px;
    box-shadow: 0 2px 24px rgba(92,75,62,0.025);
    opacity: 0;
    transform: translateY(28px);
    transition: opacity 0.75s cubic-bezier(0.22, 0.61, 0.36, 1) 0.18s,
                transform 0.75s cubic-bezier(0.22, 0.61, 0.36, 1) 0.18s;
  }
  .resonance-card.grown { opacity: 1; transform: translateY(0); }
  .resonance-card-label {
    font-size: 11px; font-weight: 500; color: var(--text-muted);
    letter-spacing: 3.5px; margin-bottom: 18px; text-transform: uppercase;
  }
  .resonance-item {
    display: flex; align-items: flex-start; gap: 14px;
    padding: 12px 0;
    border-bottom: 1px solid rgba(224,217,207,0.35);
  }
  .resonance-item:last-child { border-bottom: none; padding-bottom: 0; }
  .resonance-plant-icon {
    width: 22px; height: 22px; flex-shrink: 0;
    opacity: 0.55; margin-top: 2px;
  }
  .resonance-plant-name {
    font-size: 15px; font-weight: 600; color: var(--text-primary);
    letter-spacing: 1px; line-height: 1.6;
  }
  .resonance-plant-mutter {
    font-size: 13px; color: var(--text-secondary);
    line-height: 1.9; letter-spacing: 0.7px;
    margin-top: 2px;
    font-style: italic;
  }

  /* 底部操作 */
  .result-save-hint {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; padding: 28px 0 12px;
    font-size: 11px; color: var(--text-muted); letter-spacing: 2px;
  }
  .result-save-hint svg { width: 18px; height: 18px; opacity: 0.5; animation: float 2s ease-in-out infinite; }
  .btn-restart {
    padding: 14px 44px;
    background: var(--bg-card);
    color: var(--rouge);
    border: none;
    border-radius: 50px;
    font-size: 14px; font-weight: 600; letter-spacing: 3px;
    cursor: pointer; transition: all 0.3s ease; margin-bottom: 20px;
    box-shadow: 0 2px 18px rgba(92,75,62,0.04);
  }
  .btn-restart:active {
    background: #FDF8F4;
    transform: scale(0.96);
  }

  /* 背景装饰 */
  .bg-decoration {
    position: absolute; border-radius: 50%;
    pointer-events: none; z-index: 0; opacity: 0.03;
  }
  .bg-dot-1 {
    width: 200px; height: 200px;
    background: var(--dai-blue);
    top: -60px; right: -60px;
    animation: float 7s ease-in-out infinite;
  }
  .bg-dot-2 {
    width: 140px; height: 140px;
    background: var(--shi-green);
    bottom: -40px; left: -40px;
    animation: float 6s ease-in-out infinite reverse;
  }
  .bg-dot-3 {
    width: 80px; height: 80px;
    background: var(--rouge);
    top: 45%; right: 8%;
    animation: float 5s ease-in-out infinite 1s;
  }

  /* 标题区生长动画 — 优化：更细腻的淡入与上移，stagger effect */
  .result-header, .result-quote-block, .result-tags-row, .radar-section-title, .radar-container {
    opacity: 0;
    transform: translateY(22px);
    transition: opacity 0.8s cubic-bezier(0.22, 0.61, 0.36, 1),
                transform 0.8s cubic-bezier(0.22, 0.61, 0.36, 1);
  }
  .result-header.grown, .result-quote-block.grown, .result-tags-row.grown,
  .radar-section-title.grown, .radar-container.grown {
    opacity: 1;
    transform: translateY(0);
  }
</style>
</head>
<body>

<div class="app-container">
  <div class="bg-decoration bg-dot-1"></div>
  <div class="bg-decoration bg-dot-2"></div>
  <div class="bg-decoration bg-dot-3"></div>

  <!-- ========== 首页 ========== -->
  <div class="page home-page active" id="homePage">
    <!-- 去Emoji化：使用SVG线条图标 -->
    <svg class="home-logo" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="36" cy="28" r="16" stroke="#B5453A" stroke-width="1.5" fill="none" opacity="0.6"/>
      <path d="M36 44 L36 62" stroke="#B5453A" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
      <path d="M26 52 Q36 48 46 52" stroke="#B5453A" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.4"/>
      <path d="M22 34 Q30 26 36 20 Q42 26 50 34" stroke="#D4847A" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.5"/>
    </svg>
    <h1 class="home-title">
      你的<span class="highlight">命中注定</span><br>是哪一株植物
    </h1>
    <div class="home-divider"></div>
    <p class="home-subtitle">PLANT PERSONALITY TEST</p>
    <p class="home-desc">
      每个人都是一颗独特的种子<br>
      在光照与土壤之间，找到你的根系所在
    </p>
    <button class="btn-start" id="btnStart" onclick="startQuiz()">
      开启命中注定的测试
    </button>
  </div>

  <!-- ========== 答题页 ========== -->
  <div class="page quiz-page" id="quizPage">
    <div class="quiz-progress-wrap">
      <div class="quiz-progress-bar">
        <div class="quiz-progress-fill" id="progressFill" style="width: 0%;"></div>
      </div>
      <div class="quiz-progress-text" id="progressText">1 / 12</div>
    </div>
    <div class="quiz-question-card" id="questionCard">
      <div class="quiz-question-number" id="questionNumber">Q1</div>
      <div class="quiz-question-title" id="questionTitle"></div>
      <div class="quiz-options" id="optionsContainer"></div>
    </div>
  </div>

  <!-- ========== 结果页 ========== -->
  <div class="page result-page" id="resultPage">
    <div class="result-page-inner">
      <div class="result-header" id="resultHeader">
        <div class="result-plant-icon" id="resultIconSvg"></div>
        <div class="result-plant-name" id="resultPlantName"></div>
        <div class="result-plant-subtitle" id="resultPlantSubtitle"></div>
        <div class="result-phase-badge" id="resultPhaseBadge"></div>
      </div>

      <!-- 核心金句 -->
      <div class="result-quote-block" id="resultQuoteBlock">
        <div class="result-quote-text" id="resultQuote"></div>
        <div class="result-quote-divider"></div>
      </div>

      <!-- 胶囊标签 -->
      <div class="result-tags-row" id="resultTagsRow"></div>

      <!-- 雷达图 -->
      <div class="radar-section-title" id="radarTitle">五维灵魂结构</div>
      <div class="radar-container" id="radarContainer">
        <canvas id="radarChart"></canvas>
      </div>

      <!-- 生命切片① 素描 -->
      <div class="slice-card sketch-card" id="cardSketch">
        <svg class="slice-card-icon" viewBox="0 0 28 28" fill="none"><circle cx="14" cy="10" r="7" stroke="#3B5A6D" stroke-width="1.5"/><path d="M14 17 L14 26" stroke="#3B5A6D" stroke-width="1.5" stroke-linecap="round"/><path d="M9 22 L14 18 L19 22" stroke="#3B5A6D" stroke-width="1.2" fill="none" stroke-linecap="round"/></svg>
        <div class="slice-card-title">灵魂素描</div>
        <div class="slice-card-body" id="textSketch"></div>
      </div>

      <!-- 生命切片② 共生困境 -->
      <div class="slice-card" id="cardWhyDie">
        <svg class="slice-card-icon" viewBox="0 0 28 28" fill="none"><path d="M14 2 C8 8 6 14 6 18 C6 22 10 26 14 26 C18 26 22 22 22 18 C22 14 20 8 14 2Z" stroke="#5B8C6F" stroke-width="1.5" fill="none"/><path d="M14 10 L14 20" stroke="#5B8C6F" stroke-width="1.5" stroke-linecap="round"/><path d="M10 15 L18 15" stroke="#5B8C6F" stroke-width="1.5" stroke-linecap="round"/></svg>

  scores: { light: 50, dry: 50, bloom: 50, soil: 50, chronos: 0 },
  reset() { this.scores = { light: 50, dry: 50, bloom: 50, soil: 50, chronos: 0 }; },
  apply(effects) {
    for (const [key, delta] of Object.entries(effects)) {
      if (this.scores.hasOwnProperty(key)) {
        this.scores[key] = Math.max(5, Math.min(95, this.scores[key] + delta));
      }
    }
  },
  getSnapshot() { return { ...this.scores }; },

  // [重构逻辑：Chronos 维度 — 基于答题分布特征计算时间相位]
  // 总分越高、波动越大 → "发散"（初生）；总分越低、越平稳 → "收敛"（沉淀）
  computeChronos(answerHistory) {
    const vals = answerHistory; // 每个选项的 effect 强度总和
    const sum = vals.reduce((a, b) => a + b, 0);
    const avg = sum / vals.length;
    const variance = vals.reduce((s, v) => s + (v - avg) * (v - avg), 0) / vals.length;
    // chronos > 0 → 发散/初生；chronos <= 0 → 收敛/沉淀
    this.scores.chronos = Math.round((avg * 0.6 + Math.sqrt(variance) * 0.4) - 50);
  }
};

function pickResonancePlants(scores) {
  // [优化：基于四维分值生成稳定的种子，混合混沌因子制造差异]
  const seedBase = (scores.light * 3 + scores.dry * 7 + scores.bloom * 11 + scores.soil * 17);
  const shuffled = [...resonancePlantPool];
  // Fisher-Yates 洗牌（基于分值的确定性种子 + 混沌偏移）
  for (let i = shuffled.length - 1; i > 0; i--) {
    const pseudoRand = ((seedBase * (i + 1) * 13 + chaosSeed * 10000) % 1000) / 1000;
    const j = Math.floor(pseudoRand * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  // 取 2-3 种
  const count = (seedBase % 2 === 0) ? 3 : 2;
  return shuffled.slice(0, count);
}

  const progressText = document.getElementById('progressText');
  const card = document.getElementById('questionCard');

  const progress = (index / questions.length) * 100;
  progressFill.style.width = progress + '%';
  progressText.textContent = `${index + 1} / ${questions.length}`;

  document.getElementById('questionNumber').textContent = `Q${q.id}`;
  document.getElementById('questionTitle').textContent = q.title;

  const optionsContainer = document.getElementById('optionsContainer');
  optionsContainer.innerHTML = '';
  q.options.forEach((opt, optIndex) => {
    const btn = document.createElement('button');
    btn.className = 'quiz-option';
    btn.innerHTML = `<span class="option-label">${opt.label}</span>${opt.text}`;
    btn.addEventListener('click', () => selectOption(index, optIndex, btn));
    optionsContainer.appendChild(btn);
  });

  card.classList.remove('switching');
  void card.offsetWidth;
}

// ==================== 选择选项 ====================
function selectOption(questionIndex, optionIndex, btnElement) {
  if (state.isAnimating) return;
  state.isAnimating = true;

  document.querySelectorAll('.quiz-option').forEach(b => b.classList.remove('selected'));
  btnElement.classList.add('selected');

  const effects = questions[questionIndex].options[optionIndex].effects;
  ScoreEngine.apply(effects);

  // [重构逻辑：记录 effect 强度用于 Chronos 计算]
  const totalEffect = Object.values(effects).reduce((a, b) => a + Math.abs(b), 0);
  state.answerHistory.push(totalEffect);

  setTimeout(() => {
    const nextIndex = questionIndex + 1;
    if (nextIndex >= questions.length) {
      document.getElementById('progressFill').style.width = '100%';
      document.getElementById('progressText').textContent = `${questions.length} / ${questions.length}`;
      setTimeout(() => finishQuiz(), 400);
    } else {
      const card = document.getElementById('questionCard');
      card.classList.add('switching');
      setTimeout(() => {
        state.currentQuestionIndex = nextIndex;
        renderQuestion(nextIndex);
        state.isAnimating = false;
      }, 350);
    }
  }, 300);
}

// ==================== 生长动画触发 ====================
// [优化：结果展示时，植物静默苏醒 — stagger延迟更细腻，制造仪式感]
function triggerGrowAnimations() {
  const growTargets = [
    document.getElementById('resultHeader'),
    document.getElementById('resultQuoteBlock'),
    document.getElementById('resultTagsRow'),
    document.getElementById('radarTitle'),
    document.getElementById('radarContainer')
  ];

  // 标题区依次生长 — 优化：更从容的间隔
  growTargets.forEach((el, i) => {
    if (el) {
      setTimeout(() => el.classList.add('grown'), 80 + i * 140);
    }
  });

  // 卡片依次生长 — 优化：包含共振卡片，更细腻的 stagger
  const cards = document.querySelectorAll('.slice-card, .contract-card, .resonance-card');
  cards.forEach((card, i) => {
    setTimeout(() => card.classList.add('grown'), 650 + i * 160);
  });
}

// ==================== 完成测试 ====================
function finishQuiz() {
  state.isAnimating = false;
  const scores = ScoreEngine.getSnapshot();

  // [重构逻辑：计算 Chronos 时间相位维度]
  ScoreEngine.computeChronos(state.answerHistory);
  const finalScores = ScoreEngine.getSnapshot();

  // [重构逻辑：混沌因子注入最终得分，制造诗性差异]
  const chaoticScores = { ...finalScores };
  chaoticScores.light = Math.max(5, Math.min(95, chaoticScores.light + (chaosSeed * 2 - 0.001)));
  chaoticScores.dry = Math.max(5, Math.min(95, chaoticScores.dry + (chaosSeed * 3 - 0.0015)));

  const result = buildFullResult(chaoticScores);
  const primary = result.primary;

  // 重置生长动画状态
  document.querySelectorAll('.grown').forEach(el => el.classList.remove('grown'));

  // 渲染头部 — SVG图标
  const iconContainer = document.getElementById('resultIconSvg');
  const iconSvg = plantIcons[primary.name] || plantIcons["定轨孢子"];
  iconContainer.innerHTML = iconSvg;

  document.getElementById('resultPlantName').textContent = primary.name;
  document.getElementById('resultPlantSubtitle').textContent = primary.sub;
  document.getElementById('resultPhaseBadge').textContent = primary.phase;

  // 渲染金句（混沌处理）
  document.getElementById('resultQuote').textContent = applyChaosToQuote(primary.quote);

  // 渲染胶囊标签
  const tagsRow = document.getElementById('resultTagsRow');
  tagsRow.innerHTML = '';
  result.tags.forEach(t => {
    const pill = document.createElement('span');
    pill.className = 'result-tag-pill';
    pill.textContent = t;
    tagsRow.appendChild(pill);
  });

  // 渲染生命切片卡片
  document.getElementById('textSketch').textContent = result.sketch;
  document.getElementById('textWhyDie').textContent = result.whyDie;
  document.getElementById('textShadowSlice').textContent = result.shadowSlice;
  document.getElementById('labelSuitable').textContent = result.flower.name;
  document.getElementById('textSuitable').textContent = result.flower.desc;

  // [重构逻辑：精神搭子文案减脂至50字内]
  document.getElementById('textLover').textContent = '天命搭子「' + result.partner + '」。浩瀚植物宇宙中，唯一能读懂你所有拧巴与沉默的灵魂。不需每天见面，知道彼此在角落安静生长就够了。';

  document.getElementById('textInsomnia').textContent = result.insomnia;

  // [优化：共振植物谱系渲染 — 2-3种冷门植物 + 意识流独白]
  const resonanceList = document.getElementById('resonanceList');
  resonanceList.innerHTML = '';
  result.resonancePlants.forEach(rp => {
    const item = document.createElement('div');
    item.className = 'resonance-item';
    item.innerHTML = `
      <svg class="resonance-plant-icon" viewBox="0 0 22 22" fill="none">
        <circle cx="11" cy="11" r="4" stroke="#5B8C6F" stroke-width="1.2" opacity="0.5"/>
        <path d="M11 7 L11 3 M11 15 L11 19 M7 11 L3 11 M15 11 L19 11" stroke="#D4847A" stroke-width="0.8" stroke-linecap="round" opacity="0.4"/>
      </svg>
      <div>
        <div class="resonance-plant-name">${rp.name}</div>
        <div class="resonance-plant-mutter">${rp.mutter}</div>
      </div>
    `;
    resonanceList.appendChild(item);
  });

  showPage('resultPage');

  // 触发生长动画
  setTimeout(() => triggerGrowAnimations(), 150);

  // [重构逻辑：雷达图增加 Chronos 第五维]
  const dimOrder = ['light', 'dry', 'bloom', 'soil', 'chronos'];
  setTimeout(() => renderRadarChart(chaoticScores, dimOrder), 500);
}

// ==================== 雷达图渲染（保持 Chart.js 逻辑，升级为五维） ====================
let radarChartInstance = null;

function renderRadarChart(scores, allDims) {
  const canvas = document.getElementById('radarChart');
  const ctx = canvas.getContext('2d');

  if (radarChartInstance) { radarChartInstance.destroy(); radarChartInstance = null; }

  const gradient = ctx.createLinearGradient(0, 0, 0, 300);
  gradient.addColorStop(0, 'rgba(181, 69, 58, 0.2)');
  gradient.addColorStop(0.5, 'rgba(91, 140, 111, 0.1)');
  gradient.addColorStop(1, 'rgba(59, 90, 109, 0.04)');

  const pointColors = allDims.map(dim => {
    if (dim === 'chronos') return scores[dim] > 0 ? 'rgba(181, 69, 58, 0.9)' : 'rgba(59, 90, 109, 0.6)';
    return scores[dim] >= 50 ? 'rgba(181, 69, 58, 0.9)' : 'rgba(91, 140, 111, 0.5)';
  });
  const pointSizes = allDims.map(dim => {
    if (dim === 'chronos') return 7;
    return scores[dim] >= 50 ? 6 : 3;
  });

  // [重构逻辑：Chronos 值映射到 0-100 范围以便雷达图显示]
  const displayData = allDims.map(dim => {
    if (dim === 'chronos') {
      // chronos 范围约 -40 ~ +40，映射到 0-100
      return Math.max(5, Math.min(95, (scores[dim] + 50)));
    }
    return scores[dim];
  });

  radarChartInstance = new Chart(ctx, {
    type: 'radar',
    data: {
      labels: ['光照欲', '耐旱度', '花期差', '土壤依赖', '时间相位'],
      datasets: [{
        label: '你的五维结构',
        data: displayData,
        backgroundColor: gradient,
        borderColor: 'rgba(181, 69, 58, 0.5)',
        borderWidth: 1.8,
        pointBackgroundColor: pointColors,
        pointBorderColor: '#fff',
        pointBorderWidth: 2,
        pointRadius: pointSizes,
        pointHoverRadius: 7,
        tension: 0.25
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: { legend: { display: false } },
      scales: {
        r: {
          beginAtZero: false, min: 0, max: 100,
          ticks: { display: false, stepSize: 20 },
          pointLabels: {
            font: { size: 11, weight: '600', family: "'PingFang SC','Microsoft YaHei',sans-serif" },
            color: '#5C5048'
          },
          grid: { color: 'rgba(181, 69, 58, 0.08)', lineWidth: 1 },
          angleLines: { color: 'rgba(181, 69, 58, 0.06)', lineWidth: 1 },
          backgroundColor: 'rgba(247, 244, 239, 0.3)'
        }
      },
      animation: { duration: 1400, easing: 'easeInOutQuart' }
    }
  });
}

// ==================== 重新测试 ====================
function restartQuiz() {
  if (radarChartInstance) { radarChartInstance.destroy(); radarChartInstance = null; }
  ScoreEngine.reset();
  state.currentQuestionIndex = 0;
  state.isAnimating = false;
  state.answerHistory = [];
  // [重构逻辑：重置生长动画]
  document.querySelectorAll('.grown').forEach(el => el.classList.remove('grown'));
  showPage('homePage');
}

// ==================== 初始化 ====================
document.addEventListener('DOMContentLoaded', () => { showPage('homePage'); });
</script>
