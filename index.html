<style>
  :root {
    --bg-page: #F9F6F1;
    --bg-card: #FFFEFA;
    --text-primary: #2B2523;
    --text-secondary: #5C5048;
    --text-muted: #948B82;
    /* 中式配色三原色 */
    --dai-blue: #3B5A6D;
    --shi-green: #5B8C6F;
    --rouge: #B5453A;
    --rouge-light: #D4847A;
    --rouge-ghost: rgba(181,69,58,0.05);
    --border: #E0D9CF;
    --border-light: #EDE7DD;
    /* 优化：阴影雾化为超浅色烟雾感 */
    --shadow-card: 0 2px 32px rgba(92,75,62,0.03);
    --shadow-card-hover: 0 4px 40px rgba(92,75,62,0.05);
    --radius-lg: 16px;
    --radius-md: 12px;
    --radius-sm: 8px;
    --transition-smooth: 0.65s cubic-bezier(0.22, 0.61, 0.36, 1);
    /* 优化：呼吸感排版 — line-height 1.9-2.2，letter-spacing +0.5px */
    --font-body: 15px;
    --line-height-body: 2.0;
    --card-width: 330px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    min-height: 100%;
    height: 100%;
    overflow: hidden; /* body 自身不滚动，滚动交给内部容器处理 */
    font-family: system-ui, -apple-system, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'WenQuanYi Micro Hei', sans-serif !important;
    background: var(--bg-page);
    -webkit-tap-highlight-color: transparent;
    -webkit-font-smoothing: antialiased;
    user-select: none;
    -webkit-user-select: none;
    color: var(--text-primary);
    font-size: var(--font-body);
    line-height: var(--line-height-body);
    letter-spacing: 0.9px;
  }

  /* ===== 主容器 ===== */
  .app-container {
    width: 100%;
    min-height: 100%;
    height: 100%;
    max-width: 430px;
    margin: 0 auto;
    position: relative;
    overflow: hidden; /* 防止全局横向溢出；纵向滚动交给各 .page 内部处理 */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* ===== 页面容器 ===== */
  .page {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 36px 32px;
    opacity: 0;
    transform: translateY(20px);
    pointer-events: none;
    transition: opacity var(--transition-smooth), transform var(--transition-smooth);
  }
  /* 需要内容溢出时滚动的页面：答题页、结果页 */
  .page.scrollable {
    justify-content: flex-start;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .page.active {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  /* ===== 首页 - 封面 ===== */
  .home-page { text-align: center; gap: 28px; }
  .home-logo {
    width: 72px; height: 72px;
    opacity: 0.85;
    animation: float 3.2s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  .home-title {
    font-size: 26px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: 3px;
    line-height: 1.5;
  }
  .home-title .highlight {
    background: linear-gradient(135deg, var(--rouge), var(--rouge-light));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .home-subtitle {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 4px;
    font-weight: 400;
    text-transform: uppercase;
  }
  .home-divider {
    width: 40px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--rouge-light), transparent);
    border-radius: 1px;
  }
  .home-desc {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 2;
    max-width: 260px;
  }
  .btn-start {
    margin-top: 8px;
    padding: 16px 52px;
    background: var(--rouge);
    color: #fff;
    border: none;
    border-radius: 50px;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 3px;
    cursor: pointer;
    box-shadow: 0 8px 28px rgba(181,69,58,0.22);
    transition: all 0.3s ease;
  }
  .btn-start:active {
    transform: scale(0.96);
    box-shadow: 0 4px 14px rgba(181,69,58,0.14);
  }

  /* ===== 答题页 ===== */
  .quiz-page { justify-content: flex-start; padding-top: 52px; gap: 0; }
  .quiz-progress-wrap { width: 100%; margin-bottom: 36px; }
  .quiz-progress-bar {
    width: 100%; height: 3px;
    background: var(--border-light);
    border-radius: 2px; overflow: hidden;
  }
  .quiz-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--shi-green), var(--dai-blue));
    border-radius: 2px;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .quiz-progress-text {
    text-align: right; font-size: 11px;
    color: var(--text-muted); margin-top: 8px; letter-spacing: 2px;
  }
  .quiz-question-card {
    width: 100%;
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    padding: 32px 24px;
    box-shadow: var(--shadow-card);
    text-align: center;
    border: none;
    transition: opacity 0.35s ease, transform 0.35s ease;
  }
  .quiz-question-card.switching { opacity: 0; transform: translateY(-12px); }
  .quiz-question-number {
    font-size: 11px; color: var(--rouge);
    letter-spacing: 5px; margin-bottom: 18px; font-weight: 600;
  }
  .quiz-question-title {
    font-size: 17px; font-weight: 700;
    color: var(--text-primary); line-height: 1.8; margin-bottom: 28px;
  }
  .quiz-options { display: flex; flex-direction: column; gap: 10px; }
  .quiz-option {
    width: 100%; padding: 16px 18px;
    background: #F9F5F0;
    border: 1.5px solid transparent;
    border-radius: var(--radius-md);
    font-size: 14px; color: var(--text-primary);
    cursor: pointer; text-align: left;
    transition: all 0.3s ease;
    font-weight: 500; line-height: 1.7;
  }
  .quiz-option .option-label {
    display: inline-block; width: 26px; height: 26px;
    line-height: 26px; text-align: center;
    background: rgba(91,140,111,0.12);
    color: var(--shi-green); border-radius: 50%;
    font-size: 12px; font-weight: 700;
    margin-right: 10px; flex-shrink: 0; transition: all 0.3s ease;
  }
  .quiz-option.selected .option-label { background: var(--shi-green); color: #fff; }
  .quiz-option:active { background: #EFE8DF; border-color: var(--border); transform: scale(0.98); }
  .quiz-option.selected {
    background: rgba(91,140,111,0.08);
    border-color: var(--shi-green);
  }

  /* ==================== 结果页 - 极简新中式 ==================== */
  .result-page {
    justify-content: flex-start;
    padding: 0 0 40px 0;
    gap: 0;
    /* 滚动能力由 .page.scrollable 基类统一提供 */
  }
  .result-page-inner {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    padding: 40px 24px 56px;
  }

  /* 结果头部 */
  .result-header { text-align: center; margin-bottom: 12px; }
  .result-plant-icon {
    width: 56px; height: 56px;
    margin: 0 auto 16px;
    opacity: 0.8;
    animation: float 2.8s ease-in-out infinite;
  }
  .result-plant-name {
    font-size: 28px; font-weight: 800;
    color: var(--text-primary);
    letter-spacing: 4px;
    line-height: 1.3;
  }
  .result-plant-subtitle {
    font-size: 13px; color: var(--text-muted);
    letter-spacing: 3px; margin-top: 8px;
    font-weight: 400; font-style: italic;
  }
  .result-phase-badge {
    display: inline-block;
    margin-top: 12px;
    padding: 6px 20px;
    border: none;
    border-radius: 20px;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--dai-blue);
    background: rgba(59,90,109,0.05);
    box-shadow: 0 1px 12px rgba(92,75,62,0.02);
  }

  /* ===== 核心金句 ===== */
  .result-quote-block {
    width: 100%;
    text-align: center;
    padding: 32px 24px;
    margin: 24px 0 12px;
    position: relative;
  }
  .result-quote-text {
    font-size: 19px; font-weight: 600;
    color: var(--text-primary);
    line-height: 2;
    letter-spacing: 2px;
    position: relative;
    display: inline-block;
    max-width: 300px;
  }
  .result-quote-text::before {
    content: '\201C';
    font-size: 44px; color: var(--rouge-light);
    position: absolute; left: -32px; top: -14px;
    font-family: Georgia, 'PingFang SC', 'Microsoft YaHei', 'SimSun', serif;
    line-height: 1; font-weight: 400; opacity: 0.6;
  }
  .result-quote-text::after {
    content: '\201D';
    font-size: 44px; color: var(--rouge-light);
    position: absolute; right: -32px; bottom: -28px;
    font-family: Georgia, 'PingFang SC', 'Microsoft YaHei', 'SimSun', serif;
    line-height: 1; font-weight: 400; opacity: 0.6;
  }
  .result-quote-divider {
    width: 36px; height: 1px;
    background: var(--border);
    margin: 24px auto 0;
    border-radius: 1px;
  }

  /* ===== 胶囊标签 ===== */
  .result-tags-row {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin: 20px 0 28px;
  }
  .result-tag-pill {
    display: inline-block;
    padding: 6px 16px;
    border: none;
    border-radius: 18px;
    font-size: 11px;
    color: var(--text-secondary);
    letter-spacing: 2.5px;
    font-weight: 500;
    background: rgba(247,244,239,0.7);
    box-shadow: 0 1px 8px rgba(92,75,62,0.02);
  }

  /* ===== 雷达图 ===== */
  .radar-container {
    width: 100%;
    max-width: 240px;
    margin: 8px auto 32px;
    position: relative;
  }
  .radar-container canvas { width: 100% !important; height: auto !important; }
  .radar-section-title {
    text-align: center;
    font-size: 11px; color: var(--text-muted);
    letter-spacing: 4px; margin-bottom: 4px;
    font-weight: 500;
  }

  /* ===== 生命切片卡片（极简 — 优化：去边框、烟雾阴影） ===== */
  .slice-card {
    width: 100%;
    max-width: var(--card-width);
    background: var(--bg-card);
    border-radius: var(--radius-lg);
    padding: 30px 26px;
    margin-bottom: 14px;
    box-shadow: var(--shadow-card);
    position: relative;
    border: none;
    /* 生长动画初始状态 — 优化：更细腻的延迟 */
    opacity: 0;
    transform: translateY(28px);
    transition: opacity 0.75s cubic-bezier(0.22, 0.61, 0.36, 1),
                transform 0.75s cubic-bezier(0.22, 0.61, 0.36, 1);
  }
  .slice-card.grown {
    opacity: 1;
    transform: translateY(0);
  }
  .slice-card-icon {
    width: 28px; height: 28px;
    margin-bottom: 12px;
    opacity: 0.65;
  }
  .slice-card-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: 3.5px;
    margin-bottom: 18px;
    padding-bottom: 14px;
    border-bottom: 1px solid rgba(224,217,207,0.5);
  }
  .slice-card-body {
    font-size: var(--font-body);
    color: var(--text-secondary);
    line-height: var(--line-height-body);
    text-align: left;
    letter-spacing: 0.9px;
  }
  /* 素描卡片 */
  .slice-card.sketch-card .slice-card-title { color: var(--dai-blue); border-bottom-color: rgba(59,90,109,0.12); }
  .slice-card.sketch-card .slice-card-body { font-size: 16px; font-weight: 500; color: var(--text-primary); font-style: italic; }
  /* 归宿卡片 — 优化：去边框，温润渐变 */
  .slice-card.exit-card {
    background: linear-gradient(135deg, #FBF9F5, #FFFEFA);
    border: none;
    box-shadow: 0 2px 28px rgba(92,75,62,0.04);
  }
  .slice-card.exit-card .slice-card-title { color: var(--rouge); border-bottom-color: rgba(181,69,58,0.08); }
  .slice-card.exit-card .slice-card-body { color: #6B3A2E; font-weight: 500; }

  /* 灵魂契约植物 — 优化：去边框，烟雾阴影 */
  .contract-card {
    width: 100%;
    max-width: var(--card-width);
    background: rgba(255,254,250,0.9);
    border: none;
    border-radius: var(--radius-lg);
    padding: 30px 26px;
    margin-bottom: 14px;
    box-shadow: 0 4px 28px rgba(92,75,62,0.03);
    opacity: 0;
    transform: translateY(28px);
    transition: opacity 0.75s cubic-bezier(0.22, 0.61, 0.36, 1) 0.12s,
                transform 0.75s cubic-bezier(0.22, 0.61, 0.36, 1) 0.12s;
  }
  .contract-card.grown { opacity: 1; transform: translateY(0); }
  .contract-card-label {
    font-size: 11px; font-weight: 500; color: var(--text-muted);
    letter-spacing: 3.5px; margin-bottom: 14px; text-transform: uppercase;
  }
  .contract-card-name {
    font-size: 20px; font-weight: 700; color: var(--text-primary);
    margin-bottom: 16px; letter-spacing: 1.5px;
  }
  .contract-card-desc {
    font-size: var(--font-body); line-height: var(--line-height-body);
    color: var(--text-secondary); text-align: justify; letter-spacing: 0.9px;
  }

  /* 共振植物谱系卡片 — 新中式高级感 */
  .resonance-card {
    width: 100%;
    max-width: var(--card-width);
    background: linear-gradient(135deg, rgba(247,244,239,0.6), rgba(255,254,250,0.9));
    border: none;
    border-radius: var(--radius-lg);
    padding: 30px 26px;
    margin-bottom: 14px;
    box-shadow: 0 2px 24px rgba(92,75,62,0.025);
    opacity: 0;
    transform: translateY(28px);
    transition: opacity 0.75s cubic-bezier(0.22, 0.61, 0.36, 1) 0.18s,
                transform 0.75s cubic-bezier(0.22, 0.61, 0.36, 1) 0.18s;
  }
  .resonance-card.grown { opacity: 1; transform: translateY(0); }
  .resonance-card-label {
    font-size: 11px; font-weight: 500; color: var(--text-muted);
    letter-spacing: 3.5px; margin-bottom: 18px; text-transform: uppercase;
  }
  .resonance-item {
    display: flex; align-items: flex-start; gap: 14px;
    padding: 12px 0;
    border-bottom: 1px solid rgba(224,217,207,0.35);
  }
  .resonance-item:last-child { border-bottom: none; padding-bottom: 0; }
  .resonance-plant-icon {
    width: 22px; height: 22px; flex-shrink: 0;
    opacity: 0.55; margin-top: 2px;
  }
  .resonance-plant-name {
    font-size: 15px; font-weight: 600; color: var(--text-primary);
    letter-spacing: 1px; line-height: 1.6;
  }
  .resonance-plant-mutter {
    font-size: 13px; color: var(--text-secondary);
    line-height: 1.9; letter-spacing: 0.7px;
    margin-top: 2px;
    font-style: italic;
  }

  /* 底部操作 */
  .result-save-hint {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; padding: 28px 0 12px;
    font-size: 11px; color: var(--text-muted); letter-spacing: 2px;
  }
  .result-save-hint svg { width: 18px; height: 18px; opacity: 0.5; animation: float 2s ease-in-out infinite; }
  .btn-save-report {
    padding: 16px 48px;
    background: var(--rouge);
    color: #FFFEFA;
    border: none;
    border-radius: 50px;
    font-size: 15px; font-weight: 600; letter-spacing: 3px;
    cursor: pointer; transition: all 0.45s cubic-bezier(0.22, 0.61, 0.36, 1);
    margin-top: 16px; margin-bottom: 10px;
    box-shadow: 0 4px 24px rgba(181,69,58,0.18);
    font-feature-settings: "kern" 1;
  }
  .btn-save-report:active {
    background: #A03A31;
    transform: scale(0.96);
    box-shadow: 0 2px 14px rgba(181,69,58,0.12);
  }
  .btn-save-report:disabled {
    opacity: 0.5; pointer-events: none;
  }
  .btn-restart {
    padding: 14px 44px;
    background: var(--bg-card);
    color: var(--rouge);
    border: none;
    border-radius: 50px;
    font-size: 14px; font-weight: 600; letter-spacing: 3px;
    cursor: pointer; transition: all 0.3s ease; margin-bottom: 20px;
    box-shadow: 0 2px 18px rgba(92,75,62,0.04);
  }
  .btn-restart:active {
    background: #FDF8F4;
    transform: scale(0.96);
  }

  /* 背景装饰 */
  .bg-decoration {
    position: absolute; border-radius: 50%;
    pointer-events: none; z-index: 0; opacity: 0.03;
  }
  .bg-dot-1 {
    width: 200px; height: 200px;
    background: var(--dai-blue);
    top: -60px; right: -60px;
    animation: float 7s ease-in-out infinite;
  }
  .bg-dot-2 {
    width: 140px; height: 140px;
    background: var(--shi-green);
    bottom: -40px; left: -40px;
    animation: float 6s ease-in-out infinite reverse;
  }
  .bg-dot-3 {
    width: 80px; height: 80px;
    background: var(--rouge);
    top: 45%; right: 8%;
    animation: float 5s ease-in-out infinite 1s;
  }

  /* 标题区生长动画 — 优化：更细腻的淡入与上移，stagger effect */
  .result-header, .result-quote-block, .result-tags-row, .radar-section-title, .radar-container {
    opacity: 0;
    transform: translateY(22px);
    transition: opacity 0.8s cubic-bezier(0.22, 0.61, 0.36, 1),
                transform 0.8s cubic-bezier(0.22, 0.61, 0.36, 1);
  }
  .result-header.grown, .result-quote-block.grown, .result-tags-row.grown,
  .radar-section-title.grown, .radar-container.grown {
    opacity: 1;
    transform: translateY(0);
  }

  /* ===== 生活植物双卡片 — Flex 横向排列，移动端不坍缩 ===== */
  .life-plant-duo {
    width: 100%;
    max-width: var(--card-width);
    display: flex;
    flex-direction: row;
    gap: 12px;
    margin: 20px 0 14px;
    /* 生长动画初始状态 */
    opacity: 0;
    transform: translateY(28px);
    transition: opacity 0.75s cubic-bezier(0.22, 0.61, 0.36, 1) 0.24s,
                transform 0.75s cubic-bezier(0.22, 0.61, 0.36, 1) 0.24s;
  }
  .life-plant-duo.grown {
    opacity: 1;
    transform: translateY(0);
  }
  .life-plant-card {
    flex: 1 1 50%;
    min-width: 0;
    background: var(--bg-card);
    border-radius: var(--radius-md);
    padding: 20px 16px;
    box-shadow: var(--shadow-card);
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  /* 左侧慰藉卡 — 绿色边框 */
  .life-plant-card.easy-card {
    border: 1.5px solid rgba(91, 140, 111, 0.35);
    background: linear-gradient(180deg, rgba(91,140,111,0.04), rgba(255,254,250,1));
  }
  /* 右侧困境卡 — 灰调边框 */
  .life-plant-card.hard-card {
    border: 1.5px solid rgba(148, 139, 130, 0.3);
    background: linear-gradient(180deg, rgba(148,139,130,0.03), rgba(255,254,250,1));
  }
  .life-plant-card-header {
    display: flex;
    align-items: center;
    gap: 6px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border-light);
  }
  .easy-card .life-plant-card-header { border-bottom-color: rgba(91,140,111,0.15); }
  .hard-card .life-plant-card-header { border-bottom-color: rgba(148,139,130,0.15); }
  .life-plant-card-icon {

<script>
// ==================== 密钥验证（SHA-256 哈希校验） ====================
// ★ 说明：此处仅存储订单号的 SHA-256 哈希值，不存储明文。
//   新增订单号请使用 hash-tool.html 生成哈希，粘贴到下方数组即可。
var hashedOrders = [
  '44f66909de182f64431897419c29a288a4b861178d507ac3c82f2e62360391bd',
  '098d9f964cdaf62fe50de219671f073922b4dd4a25f36de98930c207b725ac25',
  'c03ea39c5844307606c01d9f451d423e14e9a074267a479ad272dbc5cd57f13e',
  '07b9acdcc2272bda5800b212486dac2331c5d8a77a82c416d629a45433959640',
  'b81925e32c6392604ab493ee7ad299a23cfb1a6a8852d14017c962eec7e74432',
  '66d17f8e622872b9778955c60a8bb94cbf51acdd693de728b3a750fa6d2ee23a'
];

var _failedAttempts = 0;
var _lockoutTimer = null;
var _lockoutSeconds = 0;

// 将 ArrayBuffer 转为十六进制字符串
function bufferToHex(buffer) {
  return Array.from(new Uint8Array(buffer))
    .map(function(b) { return b.toString(16).padStart(2, '0'); })
    .join('');
}

// ● 哈希校验主逻辑（异步：Web Crypto API）
function verifyKey() {
  var input = document.getElementById('orderInput');
  var btn = document.getElementById('checkBtn');
  var errorEl = document.getElementById('loginError');
  var countdownEl = document.getElementById('loginCountdown');

  if (btn.disabled && _lockoutSeconds > 0) return;

  var value = input.value.trim();
  if (!value) {
    errorEl.textContent = '请输入密钥';
    return;
  }

  // 转为 ArrayBuffer 后计算 SHA-256
  var encoder = new TextEncoder();
  var data = encoder.encode(value);

  crypto.subtle.digest('SHA-256', data).then(function(hashBuffer) {
    var hashHex = bufferToHex(hashBuffer);

    // 比对预存哈希数组
    var matched = hashedOrders.some(function(h) { return h === hashHex; });

    if (matched) {
      errorEl.textContent = '';
      countdownEl.textContent = '';
      _failedAttempts = 0;
      input.value = '';

      // ★ 防篡改 ①：写入 sessionStorage 标记（关闭标签页即失效）
      try {
        sessionStorage.setItem('_plant_auth_key', hashHex);
      } catch(e) {}

      document.getElementById('loginBox').style.display = 'none';
      document.getElementById('testContent').style.display = 'block';
    } else {
      handleFailedAttempt(errorEl, countdownEl, btn, input);
    }
  }).catch(function() {
    // crypto.subtle 不可用时降级为精确匹配（极少数老旧浏览器）
    errorEl.textContent = '当前浏览器不支持安全校验，请使用现代浏览器打开';
  });
}

function handleFailedAttempt(errorEl, countdownEl, btn, input) {
  _failedAttempts++;
  errorEl.textContent = '密钥无效或已失效，请联系客服';
  input.value = '';
  input.focus();

  if (_failedAttempts >= 3) {
    _lockoutSeconds = 30;
    btn.disabled = true;
    errorEl.textContent = '尝试次数过多，请等待 ' + _lockoutSeconds + ' 秒后再试';

    _lockoutTimer = setInterval(function() {
      _lockoutSeconds--;
      if (_lockoutSeconds <= 0) {
        clearInterval(_lockoutTimer);
        _lockoutTimer = null;
        btn.disabled = false;
        _failedAttempts = 0;
        errorEl.textContent = '';
        countdownEl.textContent = '';
      } else {
        errorEl.textContent = '尝试次数过多，请等待 ' + _lockoutSeconds + ' 秒后再试';
        countdownEl.textContent = '（还剩 ' + _lockoutSeconds + ' 秒）';
      }
    }, 1000);
  }
}

// ★ 防篡改 ②：页面加载时检查 sessionStorage 恢复状态
(function initAuth() {
  var stored = null;
  try { stored = sessionStorage.getItem('_plant_auth_key'); } catch(e) {}

  if (stored && hashedOrders.some(function(h) { return h === stored; })) {
    // 已通过验证 → 直接显示内容
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('testContent').style.display = 'block';
  } else {
    // 未验证 → 显示登录面板
    document.getElementById('loginBox').style.display = '';
    document.getElementById('testContent').style.display = 'none';
  }
})();

// ★ 防篡改 ③：定时检测 DOM 状态 — 若 loginBox 被控制台强行移除则恢复
(function guardAuth() {
  setInterval(function() {
    if (typeof hashedOrders === 'undefined') return;
    try {
      var stored = sessionStorage.getItem('_plant_auth_key');
      var isAuthed = stored && hashedOrders.some(function(h) { return h === stored; });
      var loginBox = document.getElementById('loginBox');
      var testContent = document.getElementById('testContent');
      if (!isAuthed && loginBox && loginBox.style.display === 'none') {
        loginBox.style.display = '';
        if (testContent) testContent.style.display = 'none';
      }
    } catch(e) {}
  }, 2000);
})();

// 回车键触发验证
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    var loginBox = document.getElementById('loginBox');
    if (loginBox && loginBox.style.display !== 'none') {
      verifyKey();
    }
  }
});

// ==================== 多维度计分引擎（五维） ====================
// [重构逻辑：在原有四维基础上增加 Chronos 时间相位维度]
const ScoreEngine = {
  scores: { light: 50, dry: 50, bloom: 50, soil: 50, chronos: 0 },
  reset() { this.scores = { light: 50, dry: 50, bloom: 50, soil: 50, chronos: 0 }; },
  apply(effects) {
    for (const [key, delta] of Object.entries(effects)) {
      if (this.scores.hasOwnProperty(key)) {
        this.scores[key] = Math.max(5, Math.min(95, this.scores[key] + delta));
      }
    }
  },
  getSnapshot() { return { ...this.scores }; },

  // [重构逻辑：Chronos 维度 — 基于答题分布特征计算时间相位]
  // 总分越高、波动越大 → "发散"（初生）；总分越低、越平稳 → "收敛"（沉淀）
  computeChronos(answerHistory) {
    const vals = answerHistory; // 每个选项的 effect 强度总和
    const sum = vals.reduce((a, b) => a + b, 0);
    const avg = sum / vals.length;
    const variance = vals.reduce((s, v) => s + (v - avg) * (v - avg), 0) / vals.length;
    // chronos > 0 → 发散/初生；chronos <= 0 → 收敛/沉淀
    this.scores.chronos = Math.round((avg * 0.6 + Math.sqrt(variance) * 0.4) - 50);
  }
};

// [重构逻辑：混沌因子 — 全量随机种子，为每个测试环节提供独立熵源]
let chaosSeed = Math.random();

// ==================== 扰动因子：为五维得分注入随机噪声 ====================
// [重构：Math.random() 在 ±10 范围内波动，打破固定阈值带来的重复结果]
function addNoisePerturbation(scores) {
  const noise = () => (Math.random() - 0.5) * 20; // ±10 均匀分布
  return {
    light:  Math.max(5, Math.min(95, Math.round(scores.light  + noise()))),
    dry:    Math.max(5, Math.min(95, Math.round(scores.dry    + noise()))),
    bloom:  Math.max(5, Math.min(95, Math.round(scores.bloom  + noise()))),
    soil:   Math.max(5, Math.min(95, Math.round(scores.soil   + noise()))),
    chronos: Math.round(scores.chronos + noise())
  };
}

// ==================== 题库（12道题，保持不变） ====================
const questions = [
  {
    id: 1,
    title: '如果把你的疲惫拟音化，你觉得它最像以下哪种声音？',

// ==================== 32种植物主格（16基础 × 2时间相位） ====================
// [优化：每个亚种增加 altQuotes 数组，重测时随机抽取，确保同类别结果不重复]
const primaryPlants = {
  // HHHH — 孔雀龙舌兰
  "HHHH": {
    base: { name: "孔雀龙舌兰", sub: "诞生于神殿废墟，某种纯粹的极致" },
    divergent: { name: "破晓龙舌兰", sub: "刚破壳的火焰，尚未学会收敛锋芒",
      quotes: ["也许这世上本就没有伪装这回事。在某种光线里，你的锐利不需要解释。","我们看见一种未经打磨的锋利——笨拙的、滚烫的，像刚从熔炉里取出的铁。","有一些东西，在学会收敛之前，反而离真实最近。","关于温度这件事：失控的火焰比温顺的烛火更让人无法移开目光。"] },
    convergent: { name: "沉金龙舌兰", sub: "在灰烬中冷却为不朽的黄金",
      quotes: ["某天清晨醒来，发现沉默不是消失——是燃烧过后淬出的一小块琥珀。","精准是一种不需要外显的东西。它藏在那次不经意的停顿里，微光闪烁。","烈火过后，我们在地上捡到的不是灰烬，是一块不易腐蚀的什么。","不再急着证明任何事。或许不证明本身，就是最安静的回响。"] }
  },
  // HHHL — 赛博极光捕蝇草
  "HHHL": {
    base: { name: "赛博极光捕蝇草", sub: "悬浮于高空、没有重力的流浪星尘" },
    divergent: { name: "脉冲捕蝇草", sub: "每一条触须都在向外发射信号",
      quotes: ["有一种渴望是被接住，但伸手之前先亮出刺——这是一种什么样的矛盾。","那些信号在某种空旷里以光速扩散，接收者也许还没有出生。","发送了太多频率，多到某个夜晚自己都分不清哪一条才是真正想说的。","像一颗规律自转的脉冲星，在宇宙深处持续发出某种只有同类能破译的韵律。"] },
    convergent: { name: "静默捕蝇草", sub: "已将信号收回，在真空里独善其身",
      quotes: ["不再发射任何频率之后，我们忽然感受到了某种更深的引力。","当所有噪音都停歇，存在本身反而更加清晰——像雾气散去的湖面。","触须收回来，奇妙的是，不用伸手也能感知周围的温度。","停止呼叫之后听见的回响，来自胸腔深处——原来心跳一直都在那里。"] }
  },
  // HHLH — 镜像双生极光兰
  "HHLH": {
    base: { name: "镜像双生极光兰", sub: "锁在琥珀里、拒绝风吹散的精致标本" },
    divergent: { name: "棱镜极光兰", sub: "还在折射每一个角度的光",
      quotes: ["千万种反射叫人着迷，以至于忘了光源从来就在体内某个安静的地方。","每一面棱镜像一个微小的面具——被击碎的那天，或许能看见光原本的颜色。","在不同的人面前折射出不同的波长，回到自己房间时，不记得原初的色调。","多面性是一座迷宫。有趣的是，造迷宫的人自己也正在迷路。"] },
    convergent: { name: "定色极光兰", sub: "选定了一个波长，从此不再摇摆",
      quotes: ["风终于吹不散什么了。我们学会了自己成为自己的琥珀，缓慢而坚定。","当所有反射都消失，最纯粹的光原来不是折出来的——是从内部烧出来的。","选定了一种颜色，不因为它最美，只因为那是某次失重中第一次看见自己的模样。","不再摇摆不是僵硬。只是终于找到了那个无需解释的波长，像找到回家的路。"] }
  },
  // HHLL — 法式几何松柏
  "HHLL": {
    base: { name: "法式几何松柏", sub: "清冷美术馆里，独自站了很久" },
    divergent: { name: "锐角松柏", sub: "仍在切割空气，寻找最精确的轮廓",
      quotes: ["用某种精密的逻辑丈量世界，却忘了自己从未被任何公式定义过。","每一个锐角像是对混沌的抵抗——但世界从来不是坐标系，我们也从来不是方程式。","试图用最精确的线条画出自己，却发现最精确的东西往往有最不像人的轮廓。","理性是一把手术刀。解剖世界的间隙，也在解剖自己那块柔软的角落。"] },
    convergent: { name: "恒温松柏", sub: "线条已定，清冷中透出温润",
      quotes: ["不需要任何人的注视来确认存在了。这件事本身，就是一种微光的自由。","几何是最古老的语言。学着用它来写诗，而不是画图——这件事花了很久。","清冷不再是一种距离，而是一种不需要解释的质地，像晨雾中的远山。","终于允许线条之间留有缝隙——让光透进来一点，让风偶尔穿过。"] }
  },
  // LHHH — 灰烬黑曜玫瑰
  "LHHH": {
    base: { name: "灰烬黑曜玫瑰", sub: "废土里延迟爆发的破坏性浪漫" },
    divergent: { name: "裂焰玫瑰", sub: "正在废墟中积蓄第一缕硝烟",
      quotes: ["火光能烧多远，也许连它自己也不知道。但引线的咝咝声，已经听见了。","废墟在某些时刻比温室更诚实。雨水浸过的砖缝里，冒出的绿比任何花圃都真实。","有一种浪漫带着摧毁的气味，但它毁掉的不是世界——是自己搭建的假墙。","学习如何把某种潮湿的愤怒变成光，而不是把光变成更涩的愤怒——这件事正在进行。"] },
    convergent: { name: "暗火玫瑰", sub: "燃尽后留下的余温比火焰更持久",
      quotes: ["不再需要点燃黑夜了。某个瞬间发现，存在本身就让周围的黑暗微微退却。","燃尽不是终点。最烫的温度不在火焰里，藏在冷却后的余烬深处，不声张。","在灰烬中长出新的花瓣——黑色的，沉默的，比火焰更坚硬，比水更温润。","原来最深的浪漫不是烧尽一切。是烧过之后，还能在焦土下重新伸出一根须。"] }
  },
  // LHHL — 子夜毒性夜来香
  "LHHL": {
    base: { name: "子夜毒性夜来香", sub: "在白昼安静，在深夜缓缓展开" },
    divergent: { name: "锐毒夜来香", sub: "毒性尚未提纯，正在四处试炼",
      quotes: ["某个黄昏还在分辨哪些人值得被灼伤。这分辨本身，也许就是一种柔软的练习。","毒性不是武器，是还不懂得如何把尖锐翻译成另一种语言的证明。","用试探去触碰每一个靠近的人——或许最值得靠近的人，从未害怕过那些刺。","曾以为毒是盔甲。后来隐约觉得，它只是一道虚掩的门，门后才是更柔软的存在。"] },
    convergent: { name: "隐香夜来香", sub: "毒性已内化为一种若有若无的芬芳",
      quotes: ["不再审判白昼了。只是安静地等夜色从窗台漫进来，像等一位老朋友。","毒变成了一种只有同类才能辨认的气息——无需多言，闻得见的人自然闻得见。","审判太累了。某天夜里放下那柄法槌，端起一杯刚好微温的茶。","最深的毒性是让人察觉不到毒的存在，只觉得某种莫名的安心在空气里浮着。"] }
  },
  // LHLH — 苦橙独活草
  "LHLH": {
    base: { name: "苦橙独活草", sub: "深渊石缝里，带着一点微苦的回甘" },
    divergent: { name: "涩橙独活草", sub: "苦味还在舌尖寻找回甘的路径",
      quotes: ["尚未学会如何温柔地给出甜——先用微苦试探，再决定是否递出那一点回甘。","苦不是缺点的证据。也许它是一种雷达：能咽下这口苦的人，才尝得到之后的甜。","不是一切伤都需要药。有些时候，需要的只是一个知道苦是什么味道的人，坐在旁边。","还在犹豫要不要露出那一点点甜——怕被误解成别的，怕它不够，怕吓到谁。"] },
    convergent: { name: "回甘独活草", sub: "苦已化甜，成为不需言说的安慰",
      quotes: ["不再试图证明自己是解药了。靠近的人，在某个微光的时刻自己安静了下来。","苦变成一种只有时间才能翻译的语言。而时间已经带来了足够多的译者。","不说安慰的话。存在本身，在某些时刻，就是一剂不需要处方的什么。","回甘不是变甜了。是学会了让苦和甜同时存在，像江水和海水在某处交汇而不争执。"] }
  },
  // LHLL — 深海荧光半透明浮萍
  "LHLL": {
    base: { name: "深海荧光半透明浮萍", sub: "几千米深海下，一株透明的漫游者" },
    divergent: { name: "磷光浮萍", sub: "仍在黑暗中寻找同频的微光",
      quotes: ["一边假装不需要任何连接，一边在暗处发出微弱的光——我们看见了。","光微弱到只有处在同样深度的人才能察觉。而大部分生命生活在浅水区。","不是为照亮别人而发光。荧光是一种确认自己的方式：我还在这里，还在呼吸。","深海那么大，方向还没有找到，但还在游。寻找本身，在某个维度上已经足够了。"] },
    convergent: { name: "沉光浮萍", sub: "不再寻找，学会了与黑暗共生",
      quotes: ["不再假装了。是真的不再需要——深海在某些时候比陆地提供了更多自由。","黑暗不再是问题，变成了一种质地。我们在其中滑行，像某种失重的透明的鱼。","光和连接渐渐不是必需品了。觉得某种温度就够了，而温度有很多种形状。","停止了游泳。不是累了，是发现不需要目的地——漂着，在某种维度上，也是一种抵达。"] }
  },
  // HLHH — 情绪成瘾金色向日葵
  "HLHH": {
    base: { name: "情绪成瘾金色向日葵", sub: "阳光温室里密闭的情感重力场" },
    divergent: { name: "灼日向日葵", sub: "还在疯狂追逐每一道光的方向",
      quotes: ["把遇到的每一团暖光都当成太阳来追随，也许忘了自己体内也有一小簇火苗。","追光的方式太炽烈了——炽烈到被追的那些暖意，偶尔觉得微微发烫。","问题不是没有光，是不知道该朝哪个方向才能让湿透的叶子彻底干透。","太擅长给出温度了，以至于忘记被照亮也是一种需要练习的、安静的技能。"] },
    convergent: { name: "暖辉向日葵", sub: "不再追逐，学会了自转",
      quotes: ["真正的引力也许来自内部而非远处。那些结痂的旧伤，在某天变成了花瓣的纹理。","停止旋转之后，周围的事物反而开始缓缓环绕。不是因为更亮，是因为更稳了。","不再追光的向日葵，在阴影里也学会了铺展叶片，像在等待一场绵长的降雨。","自转不是孤独。也许是终于变成了一颗完整的星球，有自己的昼夜和季节。"] }
  },
  // HLHL — 瞬间完美主义极乐鸟
  "HLHL": {
    base: { name: "瞬间完美主义极乐鸟", sub: "午夜时分，会忽然亮起来一小会儿" },
    divergent: { name: "电闪极乐鸟", sub: "仍在每一个午夜引爆自己",
      quotes: ["燃烧得那么快，快到连自己也来不及看清火焰里藏着什么颜色的纹理。","每一次爆发像对平庸的某种抗议——但抗议太多，也许会变成另一种形式的重复。","把光芒压缩进瞬间，以为越亮越有价值。但真正的光，也许不需要爆炸来确认自己的存在。","完美是一把双刃的东西。一边雕琢着自己，一边刀背在另一侧留下看不见的细痕。"] },
    convergent: { name: "长明极乐鸟", sub: "学会了不灭的微光比瞬间更珍贵",
      quotes: ["不再追求完美了。不完美本身，也许就是一种活的、带着温度的证据。","一盏灯比一道闪电活得更久。选择了成为灯，而不是风暴——这件事需要某种勇气。","终于允许自己犯错了。错误不是瑕疵，是纹理，是区别于机器的那种温润的证明。","长明不是不灭。是即使灭了，也愿意在某个湿润的夜晚，重新划一根火柴。"] }
  },
  // HLLH — 琥珀定格时间蒲公英
  "HLLH": {
    base: { name: "琥珀定格时间蒲公英", sub: "将温柔死死锁在坚硬外壳里的标本" },
    divergent: { name: "颤羽蒲公英", sub: "绒毛已张开，正等待第一阵风",
      quotes: ["站在起飞的边缘——心跳比风的速度快了半拍。某种直觉说，是时候了。","一切都准备好了。只差那一下松开手指，让风去决定方向和落点。","绒毛在微光里轻轻颤着，不是因为害怕飞，是害怕飞错了方向。","起飞前的这一刻，比飞翔本身更值得被记住。因为这一刻，还握着选择。"] },
    convergent: { name: "散羽蒲公英", sub: "已乘风散去，在每一寸土壤留下印记",
      quotes: ["不再害怕未知了。发现每一片降落的地方，在某个维度上都是对的。","散落在最意想不到的角落——有些生根了，有些还在空气里漂浮。也许都没关系。","飞翔不是逃离。是一次又一次确认：在任何土壤里，都能缓慢地、不张扬地活下去。","不知道下一阵风会带它去哪。但它知道，它会在那里，用某种方式，继续生长。"] }
  },
  // HLLL — 微风鸣响寂静芒草
  "HLLL": {
    base: { name: "微风鸣响寂静芒草", sub: "风来就响，风停就忘，野生的节律" },
    divergent: { name: "啸风芒草", sub: "风一来就响，响完就忘",
      quotes: ["焦虑像风吹过芒草的沙沙声——每一秒都是新的频率，每一种频率都有名字。","被风吹得哗哗响，但风一停就忘了刚才为什么那么躁动。这也许是某种恩赐。","敏感是天线，接收所有频率，也消耗所有电量。关机这件事，还在学习中。","风穿过的时候全身都在共鸣。但共鸣不一定是音乐，有时候只是好多种声音混合在一起。"] },
    convergent: { name: "听风芒草", sub: "不再响，学会了在风中静默",
      quotes: ["风来的时候，只是微微低了低头。不再需要用尖啸来确认自己还活着了。","学会了听风，而不是随风。静默在某个维度上，是一种更深远的回响。","不再沙沙作响之后，听见了风里藏着别的——远处鸟的叫声，泥土里虫子的动静，自己的呼吸。","静默不是压抑。当风穿过你而不吵，在那一刻，你成了风的一部分。"] }
  },
  // LLHH — 极夜暗黑风信子
  "LLHH": {
    base: { name: "极夜暗黑风信子", sub: "藤蔓般缠绕——一种过于用力的在乎" },
    divergent: { name: "绞藤风信子", sub: "正用藤蔓缠住每一个靠近的温暖",
      quotes: ["测试每一段连接的强度，直到它断裂。然后轻声说：看，我早就知道会这样。","藤蔓太紧了，紧到被缠绕的人有点难以呼吸——但奇怪的是，他们并不想松开。","不是不相信爱的存在，是不相信它会持续。所以要在它消失之前，攥得更紧。","缠绕的方式像拥抱又像勒紧。分不清，被缠的人也分不清——但都在那团绿色里留了下来。"] },
    convergent: { name: "垂藤风信子", sub: "松开了藤蔓，却发现了更深的连接",
      quotes: ["不再测试了。真正属于这里的东西，不需要藤蔓，也安静地停在身边。","松手之后才发现——不是所有连接都需要力道。有些东西是松的，却从不会滑落。","学会了垂挂：不缠绕，不勒紧，只是静静地在那里，等某个潮湿的午后被人握住。","藤蔓松开后，阳光第一次照到茎的根部。原来那里，一直在不声不响地长新的叶子。"] }
  },
  // LLHL — 荒原风化苔藓
  "LLHL": {
    base: { name: "荒原风化苔藓", sub: "经历过漫长寂静，还在角落里绿着" },
    divergent: { name: "干裂苔藓", sub: "仍在风化，仍在剥落",
      quotes: ["寂静还在建造中。风化的每一块砖，在某个角落还沾着曾经很轻的呼喊。","风化不是衰老。也许是一种用沉默对噪音说话的方式：我不想参与了。","还在剥落——一层一层脱掉不太属于自己的外壳。过程很慢，偶尔有一点点疼。","在荒原上待得太久了，久到忘了湿润的触感。但还在那里——这件事本身，就够了。"] },
    convergent: { name: "润石苔藓", sub: "雨水已渗入每一道裂缝",
      quotes: ["那面墙还在，但它不再阻挡什么了。只是安静地立在那里，像一座小小的纪念碑。","裂缝不是失败的证据。是允许湿润进入的地方，是光偶尔能透进来的缝隙。","不再抗争了——不是投降，是发现有些东西不需要抗争，也能在角落里活着。","雨水没有冲走什么。它只是让这些灰绿的苔藓，更柔软地附着在这颗潮湿的星球上。"] }
  },
  // LLLH — 远古冰川沉睡地衣
  "LLLH": {
    base: { name: "远古冰川沉睡地衣", sub: "拒绝与时代同频的时间漂流瓶" },
    divergent: { name: "碎冰地衣", sub: "还在等待冰层裂开的第一道光",
      quotes: ["也许不是在沉睡，一直在等——等某个对的时代，从冰层上轻轻敲三下。","冰层下的生命不是在冬眠，是在积蓄某种极为缓慢的温度。一朝裂开，就是春天。","等待的这道微光还没有来。但等待本身，已经让细胞变得比周围的冰更柔韧了。","碎冰的声音也许是听过的最好的音乐——因为那意味着，快要出来了。"] },
    convergent: { name: "永冻地衣", sub: "已与冰层达成永恒的共存",
      quotes: ["不再等待了。沉睡本身，也许就是一种最安静、最优雅的清醒方式。","不必融化。在冰里也能活着，比任何花朵都更理解寒冷的质地和重量。","永恒不是时间的长度。是某个时刻之后，不再需要计算时间的薄厚。","与冰共存之后发现，寒冷不是一个需要对抗的东西。它是一个无需应答的、透明的伴侣。"] }
  },
  // LLLL — 宇宙真空星际孢子
  "LLLL": {
    base: { name: "宇宙真空星际孢子", sub: "超脱于碳基社会之外，独自漂浮" },
    divergent: { name: "游离孢子", sub: "正在穿越星际尘埃，尚未找到轨道",
      quotes: ["在某种真空里漂浮得太久了，久到忘了自己也可能有微小的重量和方向。","没有轨道不是缺憾。只是还不需要被任何引力约束——轻，在某个维度上也是力量。","穿越的每一片星尘都可能成为未来的星系。但停留这件事，还没有想好。","漂浮不是流浪。是用最慢的速度确认：这片无限里，有没有一缕属于自己的引力波。"] },
    convergent: { name: "定轨孢子", sub: "找到了属于自己的引力场",
      quotes: ["不再漂浮了。发现即使是最轻的存在，也能在星域的某个角落，找到微弱的锚点。","轨道是自己选的，引力是缓慢相遇的。在宇宙的某处，不再是一个透明的过客。","最轻的粒子也有质量，最小的存在也有公转周期。只是比大多数存在花了更久找到它。","定轨不是停止。是在看似静止的圆周运动里，完成一场最安静、最漫长的旅行。"] }
  }
};

// 获取 Dry/Soil 组合键
function getDrySoilKey(scores) {
  const d = scores.dry >= 50 ? '高燥' : '低燥';
  const s = scores.soil >= 50 ? '高土' : '低土';
  return d + s;
}

// 从花卉池随机选取
function pickSuitableFlower(scores) {
  const key = getDrySoilKey(scores);
  const pool = suitableFlowers[key] || suitableFlowers["低燥低土"];
  const idx = Math.floor(Math.random() * pool.length);
  return pool[idx];
}

// [重构逻辑：混沌因子融入搭子选取]
function pickPartnerPlant(scores) {
  const seed = (scores.light * 7 + scores.dry * 13 + scores.bloom * 23 + scores.soil * 37) % partnerPlants.length;
  const offset = Math.floor((Math.random() + chaosSeed * 100) * 5) % 5;
  const idx = (seed + offset) % partnerPlants.length;
  return partnerPlants[idx];
}

// [重构：共振植物选取 — 基于新32条目池，每条随机抽取1段mutter + 提取生活植物数据]
function pickResonancePlants(scores) {
  const seedBase = (scores.light * 3 + scores.dry * 7 + scores.bloom * 11 + scores.soil * 17);
  const shuffled = [...resonancePlantPool];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const pseudoRand = ((seedBase * (i + 1) * 13 + chaosSeed * 10000) % 1000) / 1000;
    const j = Math.floor(pseudoRand * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  const count = (seedBase + scores.chronos + Math.floor(chaosSeed * 10)) % 3 === 0 ? 3 : 2;
  const picked = shuffled.slice(0, count);

  // 从每条中随机抽取1段 mutter（3段备选）
  const resonanceItems = picked.map(p => ({
    name: p.name,
    mutter: p.mutters[Math.floor(Math.random() * p.mutters.length)]
  }));

  // 聚合 easyToKeep / hardToKeep（去重）
  const easySet = new Set();
  const hardSet = new Set();
  const hardReasonMap = {};
  picked.forEach(p => {
    (p.easyToKeep || []).forEach(e => easySet.add(e));
    (p.hardToKeep || []).forEach(h => {
      hardSet.add(h);
      if (_hardWhy[h] && !hardReasonMap[h]) hardReasonMap[h] = _hardWhy[h];
    });
  });

  return {
    items: resonanceItems,
    easyToKeep: [...easySet].slice(0, 4),
    hardToKeep: [...hardSet].slice(0, 4).map(h => ({ name: h, reason: hardReasonMap[h] || '' }))
  };
}


// [优化：通用加权随机抽取器 — 基于五维分值+混沌因子+盐值生成伪随机索引]
function weightedPick(arr, scores, salt) {
  if (!arr || arr.length === 0) return '';
  if (arr.length === 1) return arr[0];
  const seed = (scores.light * salt + scores.dry * (salt + 1) * 3 + scores.bloom * (salt + 2) * 7 + scores.soil * (salt + 3) * 13 + scores.chronos * (salt + 4));
  const idx = Math.abs(Math.floor((seed * chaosSeed * 10000 + Math.random() * 137) % arr.length));
  return arr[idx % arr.length];
}

// ==================== 概率性连续选择器（替代二元硬阈值） ====================
// [核心：分数值作为高维池选择概率，而非 if >= 50。分数越高，越倾向高维池。
//  这使得边界值（如51分和49分）不再产生截然不同的结果。]
function pickContinuousFragment(score, highPool, lowPool, scores, salt) {
  const highProb = Math.max(0, Math.min(1, score / 100));
  if (Math.random() < highProb) {
    return weightedPick(highPool, scores, salt);
  } else {
    return weightedPick(lowPool, scores, salt);
  }
}

// 动态拼接灵魂素描 — 概率性连续维度选择（废弃二元硬阈值）
function buildSketch(scores) {

// ==================== 基于距离倒数的加权随机植物匹配引擎 ====================
// [核心算法：(1) 计算用户五维得分与16种植物理想坐标的欧氏距离，
//  以距离倒数为权重进行带权随机抽取——越近概率越高，但所有植物都有机会。
//  (2) 根据 Chronos 正负值确定相位（明/暗），共16×2=32种可能结果。]

// 为16种基础植物生成5维理想坐标
function get16BaseCoords() {
  const bases = [];
  for (const [key, group] of Object.entries(primaryPlants)) {
    const h = key[0] === 'H' ? 70 : 30;
    const d = key[1] === 'H' ? 70 : 30;
    const b = key[2] === 'H' ? 70 : 30;
    const s = key[3] === 'H' ? 70 : 30;
    bases.push({
      key: key,
      group: group,
      coord: { light: h, dry: d, bloom: b, soil: s, chronos: 0 }
    });
  }
  return bases;
}

// 五维欧氏距离
function euclideanDist(a, b) {
  const dims = ['light','dry','bloom','soil','chronos'];
  let sumSq = 0;
  for (const d of dims) sumSq += (a[d] - b[d]) * (a[d] - b[d]);
  return Math.sqrt(sumSq);
}

// 主入口：calculateResult
// [两步流程：(1) 距离倒数加权随机 → 确定16种植物类别之一
//           (2) Chronos 正负值 → 确定明/暗相位（正=发散/明，负=收敛/暗）]
function calculateResult(scores) {
  const bases = get16BaseCoords();

  // 计算所有16个基类的距离
  const candidates = bases.map(b => ({
    base: b,
    dist: euclideanDist(scores, b.coord)
  }));

  // 完美元匹配直接返回
  const exact = candidates.find(c => c.dist < 0.001);
  if (exact) return buildResultFromBase(exact.base, scores);

  // 距离倒数 = 权重：weight = 1 / (dist + ε)
  // ε=0.01 防止除零，同时让极近的候选获得压倒性概率优势
  const EPSILON = 0.01;
  candidates.forEach(c => { c.weight = 1 / (c.dist + EPSILON); });
  const totalWeight = candidates.reduce((s, c) => s + c.weight, 0);

  // 带权随机抽取——越近概率越高，但所有16种植物都有机会被选中
  let rand = Math.random() * totalWeight;
  let selected = candidates[0];
  for (const c of candidates) {
    rand -= c.weight;
    if (rand <= 0) { selected = c; break; }
  }

  return buildResultFromBase(selected.base, scores);
}

// 根据植物基类 + chronos 相位构建最终结果
function buildResultFromBase(base, scores) {
  const isDivergent = scores.chronos > 0;
  const variant = isDivergent ? base.group.divergent : base.group.convergent;
  const quotes = variant.quotes || [''];
  const quoteIdx = Math.floor(Math.random() * quotes.length);

  return {
    name: variant.name,
    sub: variant.sub,
    quote: quotes[quoteIdx],
    phase: isDivergent ? '刚展开的叶片' : '沉入泥土的种子',
    categoryKey: base.key
  };
}

function buildFullResult(scores) {
  const primary = calculateResult(scores);
  const flower = pickSuitableFlower(scores);
  const partner = pickPartnerPlant(scores);
  const resonanceData = pickResonancePlants(scores);
  const resonancePlants = resonanceData.items;

  const sketch = buildSketch(scores);

  const shadowSlice = buildShadowSlice(scores);
  const insomnia = buildInsomnia(scores);
  return { primary, flower, partner, resonancePlants, easyToKeep, hardToKeep, tags, sketch, whyDie, shadowSlice, insomnia };
}

// ==================== 雷达图渲染（保持 Chart.js 逻辑，升级为五维） ====================
let radarChartInstance = null;

function renderRadarChart(scores, allDims) {
  // 安全保护：Chart.js 未加载时静默跳过，不阻断页面渲染
  if (typeof Chart === 'undefined') { return; }
  const canvas = document.getElementById('radarChart');
  const ctx = canvas.getContext('2d');

  if (radarChartInstance) { radarChartInstance.destroy(); radarChartInstance = null; }

  const gradient = ctx.createLinearGradient(0, 0, 0, 300);
  gradient.addColorStop(0, 'rgba(181, 69, 58, 0.2)');
  gradient.addColorStop(0.5, 'rgba(91, 140, 111, 0.1)');
  gradient.addColorStop(1, 'rgba(59, 90, 109, 0.04)');

  const pointColors = allDims.map(dim => {
    if (dim === 'chronos') return scores[dim] > 0 ? 'rgba(181, 69, 58, 0.9)' : 'rgba(59, 90, 109, 0.6)';
    return scores[dim] >= 50 ? 'rgba(181, 69, 58, 0.9)' : 'rgba(91, 140, 111, 0.5)';
  });
  const pointSizes = allDims.map(dim => {
    if (dim === 'chronos') return 7;
    return scores[dim] >= 50 ? 6 : 3;
  });

  // [重构逻辑：Chronos 值映射到 0-100 范围以便雷达图显示]
  const displayData = allDims.map(dim => {
    if (dim === 'chronos') {
      // chronos 范围约 -40 ~ +40，映射到 0-100
      return Math.max(5, Math.min(95, (scores[dim] + 50)));
    }
    return scores[dim];
  });

  radarChartInstance = new Chart(ctx, {
    type: 'radar',
    data: {
      labels: ['对光的直觉', '沉默的重量', '绽放的节律', '想停下的地方', '时间的纹理'],
      datasets: [{
        label: '一种模糊的形状',
        data: displayData,
        backgroundColor: gradient,
        borderColor: 'rgba(181, 69, 58, 0.5)',
        borderWidth: 1.8,
        pointBackgroundColor: pointColors,
        pointBorderColor: '#fff',
        pointBorderWidth: 2,
        pointRadius: pointSizes,
        pointHoverRadius: 7,
        tension: 0.25
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: { legend: { display: false } },
      scales: {
        r: {
          beginAtZero: false, min: 0, max: 100,
          ticks: { display: false, stepSize: 20 },
          pointLabels: {
            font: { size: 11, weight: '600', family: "'PingFang SC','Microsoft YaHei',sans-serif" },
            color: '#5C5048'
          },
          grid: { color: 'rgba(181, 69, 58, 0.08)', lineWidth: 1 },
          angleLines: { color: 'rgba(181, 69, 58, 0.06)', lineWidth: 1 },
          backgroundColor: 'rgba(247, 244, 239, 0.3)'
        }
      },
      animation: { duration: 1400, easing: 'easeInOutQuart' }
    }
  });
}

      const targetPhase = chronosPolarity > 0 ? '刚展开的叶片' : '沉入泥土的种子';
      const key = targetName + ' · ' + targetPhase;
      results[key] = { expected: targetName, phase: targetPhase, hits: 0, total: TRIALS };

      for (let t = 0; t < TRIALS; t++) {
        const testScores = {
          light:  base.coord.light,
          dry:    base.coord.dry,
          bloom:  base.coord.bloom,
          soil:   base.coord.soil,
          chronos: chronosVal
        };
        const noisyScores = addNoisePerturbation(testScores);
        const matched = calculateResult(noisyScores);
        if (matched.name === targetName && matched.phase === targetPhase) {
          results[key].hits++;
        }
      }
    }
  }

  console.log('=== 32种植物可达性验证报告 ===');
  console.log('(距离倒数加权随机 × 每目标' + TRIALS + '次模拟)');
  console.log('');

  let unreachable = [];
  let totalHitRate = 0;
  const totalVariants = Object.keys(results).length;

  for (const [key, data] of Object.entries(results)) {
    const rate = (data.hits / data.total * 100).toFixed(0);
    const symbol = data.hits === 0 ? '✗ 不可达! ' : data.hits < 3 ? '△ ' : '✓ ';
    totalHitRate += data.hits / data.total;

    console.log(
      symbol +
      key.padEnd(28) +
      ('  命中 ' + String(data.hits) + '/' + data.total).padEnd(16) +
      '(' + rate + '%)'
    );

    if (data.hits === 0) unreachable.push(key);
  }

  console.log('');
  console.log('平均命中率: ' + (totalHitRate / totalVariants * 100).toFixed(1) + '%');
  console.log('不可达结果数: ' + unreachable.length + ' / 32');

  if (unreachable.length > 0) {
    console.warn('⚠ 以下植物在当前映射中不可达:', unreachable);
  } else {
    console.log('✅ 全部32种植物均可被公平触发。');
  }

  return results;
}

document.addEventListener('DOMContentLoaded', () => { showPage('homePage'); });
